name: LumiWeave CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python 后端检查 ──
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Verify imports
        run: |
          python -c "from shared.agent_dispatcher import AgentDispatcher; print('dispatcher: OK')"
          python -c "from runner.tool_handlers import get_handler; assert get_handler('write_file'); print('handlers: OK')"
          python -c "from shared.adapters.openai_adapter import OpenAIAdapter; print('adapters: OK')"

  # ── 前端构建 ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: builder/frontend
        run: |
          npm install
          npx tsc --noEmit
          npx vite build

  # ── Docker 镜像构建 ──
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lumiweave .
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 --name lumiweave-test lumiweave
          sleep 10
          curl -f http://localhost:8000/api/health
          docker stop lumiweave-test
