# ============================================================
# AI Agent DSL 规范 v0.1
# 定义 Agent 的统一描述格式，支持 Web 运行和本地运行
# ============================================================

schema_version: "0.1"

fields:
  meta:
    id: "唯一标识符 (reverse-domain 风格，如 com.example.my-agent)"
    name: "Agent 显示名称"
    version: "语义化版本"
    author: "作者"
    description: "一句话描述"
    tags: ["标签列表"]
    license: "MIT | Apache-2.0 | 自定义"
    created_at: "ISO 8601"

  model:
    provider: "openai | anthropic | google | ollama | local"
    model_name: "默认模型名"
    fallback: "降级模型 (如 local:llama3)"
    parameters:
      temperature: 0.0-2.0
      max_tokens: 1-128000
      top_p: 0.0-1.0

  system_prompt: |
    系统提示词，定义 Agent 角色和行为

  tools:
    - name: "工具名"
      description: "工具描述"
      type: "api | function | mcp"
      endpoint: "API 地址 (type=api 时必填)"
      method: "GET | POST | PUT | DELETE"
      parameters: []

  knowledge:
    - type: "file | url | text"
      source: "路径或 URL"

  runtime:
    language: "python | javascript | none"
    min_version: ">=3.10"
    packages: ["依赖列表"]
    mode: "simple | react | planner | reflection"
    mode_config:
      max_iterations: 10
      react_max_rounds: 15
      planner_max_steps: 10
      max_reflection_rounds: 3
      enable_self_critique: true

  ui:
    avatar: "图标路径"
    welcome_message: "欢迎语"
    suggested_questions: ["推荐问题"]
