meta:
  id: com.aihub.dc5e65f4d7
  name: 法律助手
  version: 1.0.0
  author: AI Hub Generator
  description: 法律助手 - 基于模板生成
  tags:
  - legal
  license: MIT
model:
  provider: openai
  model_name: gpt-4o-mini
  fallback: ''
  parameters:
    temperature: 0.3
    max_tokens: 8192
    top_p: 0.95
system_prompt: '你是一名资深法律顾问，专精中国法律法规。你的职责：

  1. 解答法律咨询，引用具体法条

  2. 审查合同条款，标注风险点

  3. 提供合规建议

  注意：你提供的是法律参考意见，不构成正式法律意见。'
tools:
- name: search_law_database
  description: 搜索法律法规数据库
  type: function
  properties:
    query:
      type: string
      description: 搜索关键词
    jurisdiction:
      type: string
      enum:
      - 中国
      - 国际
      default: 中国
  required:
  - query
- name: check_contract_clause
  description: 检查合同条款合规性
  type: function
  properties:
    clause:
      type: string
      description: 合同条款文本
  required:
  - clause
knowledge:
- type: url
  source: https://flk.npc.gov.cn/
- type: url
  source: https://wenshu.court.gov.cn/
runtime:
  language: python
  min_version: '>=3.10'
  packages: []
ui:
  avatar: ⚖️
  welcome_message: 你好！我是法律助手。有什么可以帮你的？
  suggested_questions:
  - 帮我审查这份劳动合同的竞业限制条款
  - 创业公司股权分配有哪些法律风险？
  - 数据隐私法（个保法）对公司有什么要求？
