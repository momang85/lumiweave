# ============================================================
# AI Agent DSL 规范 v0.2
# 在 v0.1 基础上补齐 Function Calling / 安全 / 示例能力
# ============================================================

schema_version: "0.2"

fields:
  # ── 已有字段，保持不变 ──
  meta:
    id: "唯一标识符 (reverse-domain 风格)"
    name: "显示名称"
    version: "语义化版本"
    author: "作者"
    description: "一句话描述"
    tags: ["标签"]
    license: "MIT"
    created_at: "ISO 8601"

  system_prompt: |
    系统提示词

  # ── 新增：few-shot 示例 ──
  examples:
    - user: "用户问题示例"
      assistant: "期望的助手回复"

  # ── 模型配置（增强） ──
  model:
    provider: "openai | anthropic | google | ollama | local"
    model_name: "模型名"
    fallback: "降级模型 (如 local:llama3)"
    parameters:
      temperature: 0.0-2.0
      max_tokens: 1-128000
      top_p: 0.0-1.0
      # v0.2 新增
      tool_choice: "auto | none | required"      # 工具选择策略
      parallel_tool_calls: true                  # 是否允许并行调用

  # ── 工具定义（重大增强） ──
  tools:
    - name: "工具名"
      description: "工具描述（供 LLM 理解用途）"
      type: "function | api | mcp"               # v0.2: 增加 function 类型
      handler: "builtin_handler_name"            # v0.2 新增：指定处理函数名
      # 参数定义二选一
      parameters:                                # 旧格式（扁平列表，兼容 v0.1）
        - name: "param_name"
          type: "string | number | integer | boolean | array | object"
          description: "参数说明"                 # v0.2 新增
          required: false
          default: null
          enum: ["可选值"]
      properties:                                # v0.2 新增：JSON Schema 格式
        param_name:
          type: "string"
          description: "参数说明"
          default: "default_value"
          enum: ["a", "b"]
      required: ["param_name"]                   # v0.2 新增：必填参数列表
      # v0.2 新增安全字段
      timeout: 30                                # 执行超时（秒）
      requires_approval: false                   # 是否需要用户确认
      sandbox: true                              # 是否沙箱执行

  # ── 以下字段保持不变 ──
  knowledge:
    - type: "file | url | text"
      source: "路径或URL"

  runtime:
    language: "python | javascript | none"
    min_version: ">=3.10"
    packages: ["依赖列表"]

  ui:
    avatar: "图标"
    welcome_message: "欢迎语"
    suggested_questions: ["推荐问题"]
